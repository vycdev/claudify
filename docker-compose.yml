services:
  claudify:
    build: .
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=your_discord_bot_token_here
      - REQUIRED_ROLE_ID=your_discord_role_id_here
      - MESSAGES_DIR=/app/messages
    volumes:
      - messages:/app/messages
      - claude-home:/root

volumes:
  messages:
  claude-home:
